<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rexel — Banner Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Open Sans', sans-serif;
      background: #e8eaf0;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* ── Label marché ── */
    .market-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #9ca3af;
      padding: 20px 0 8px;
    }
    .market-label:first-child { padding-top: 0; }

    /* ═══════════════════════════════════════════════
       BANNER — grille 3 colonnes desktop 1280px+
       COL 1 : Tag + Titre  (fixe)
       COL 2 : Accroche     (fluide, 1fr)
       COL 3 : Timer + CTA  (fixe)
    ═══════════════════════════════════════════════ */
    .banner {
      width: 100%;
      min-height: 52px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: stretch;
      padding: 0 32px;
      overflow: hidden;
    }

    /* ── Accroche renforcée (SE sans CTA) ── */
    .subtitle-large {
      font-size: clamp(14px, 1.4vw, 18px) !important;
      font-weight: 600;
    }

    /* ── COL 1 : Tag + Titre ── */
    .col-identity {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 24px 6px 0;
      flex-shrink: 0;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 4px;
      padding: 0 8px;
      height: 24px;
      flex-shrink: 0;
    }
    .badge svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .badge-text {
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 12px;
      line-height: 16px;
      white-space: nowrap;
    }
    .title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 20px;
      line-height: 27px;
      color: white;
      white-space: nowrap;
    }

    /* ── COL 2 : Accroche (zone fluide) ── */
    .col-message {
      display: flex;
      align-items: center;
      padding: 0 20px;
      min-width: 0;
      overflow: hidden;
      position: relative;
    }
    .col-message::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 50%;
      width: 1px;
      background: rgba(215, 217, 228, 0.5);
    }
    .subtitle {
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: clamp(12px, 1vw, 14px);
      line-height: 1.4;
      color: white;
      white-space: nowrap;
    }

    /* ── COL 3 : Timer + CTA ── */
    .col-action {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
      padding: 6px 0 6px 24px;
      flex-shrink: 0;
    }
    .counter {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .timer-label {
      font-family: 'Open Sans', sans-serif;
      font-weight: 400;
      font-size: 12px;
      line-height: 16px;
      color: white;
      white-space: nowrap;
    }
    .units {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .unit {
      border: 1px solid #d9dee9;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2px 12px 4px;
      min-width: 44px;
    }
    .unit-num {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 14px;
      line-height: 20px;
      color: white;
    }
    .unit-lbl {
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 9px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.05em;
      line-height: 11px;
    }
    .colon {
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      color: white;
      flex-shrink: 0;
    }
    .cta {
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: none;
      border-radius: 4px;
      padding: 6px 24px;
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      line-height: 20px;
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .cta:hover { opacity: .9; }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════
       CONFIGS — un objet par marché
  ════════════════════════════════════════════════ -->
  <script>
    const CONFIGS = {

      FR: {
        tagLabel:     "Promo",
        tagBgColor:   "#eb6200",
        tagTextColor: "#ffffff",
        ctaTextColor: "#0a287d",
        title:        "Les imbatables d'avril",
        subtitle:     "Prix nets - produits offerts - coupons",
        timerLabel:   "Se termine dans",
        ctaLabel:     "Découvrir les offres",
        ctaUrl:       "#",
        targetDate:   "2026-05-15T23:59:59",
        bgColor:      "#0a287d",
      },

      SE: {
        tagLabel:     "New customer",
        tagBgColor:   "#ffffff",
        tagTextColor: "#044317",
        showCta:      false,
        subtitleLarge: true,
        title:        "Welcome!",
        subtitle:     "Place your order and get your toolbox for free",
        timerLabel:   "Offer valid",
        targetDate:   "2026-05-15T23:59:59",
        bgColor:      "#24A148",
      },

    };
  </script>

  <!-- ── FR ── -->
  <p class="market-label">France</p>
  <div class="banner" id="banner-FR">
    <div class="col-identity">
      <div class="badge" id="badge-FR">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" id="badge-icon-FR">
          <path d="M14.59 8.59 8.59 14.59a2 2 0 0 1-2.83 0l-5.35-5.35a2 2 0 0 1 0-2.83L6.41.41A2 2 0 0 1 7.83 0H13a2 2 0 0 1 2 2v5.17c0 .53-.21 1.04-.59 1.42zM12 3a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
        </svg>
        <span class="badge-text" id="tagLabel-FR"></span>
      </div>
      <span class="title" id="title-FR"></span>
    </div>
    <div class="col-message">
      <span class="subtitle" id="subtitle-FR"></span>
    </div>
    <div class="col-action">
      <div class="counter">
        <span class="timer-label" id="timerLabel-FR"></span>
        <div class="units">
          <div class="unit"><span class="unit-num" id="d-FR">00</span><span class="unit-lbl">Jours</span></div>
          <span class="colon">:</span>
          <div class="unit"><span class="unit-num" id="h-FR">00</span><span class="unit-lbl">H</span></div>
          <span class="colon">:</span>
          <div class="unit"><span class="unit-num" id="m-FR">00</span><span class="unit-lbl">Min</span></div>
        </div>
      </div>
      <a class="cta" id="cta-FR" href="#"></a>
    </div>
  </div>

  <!-- ── SE ── -->
  <p class="market-label">Sweden</p>
  <div class="banner" id="banner-SE">
    <div class="col-identity">
      <div class="badge" id="badge-SE">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" id="badge-icon-SE">
          <path d="M14.59 8.59 8.59 14.59a2 2 0 0 1-2.83 0l-5.35-5.35a2 2 0 0 1 0-2.83L6.41.41A2 2 0 0 1 7.83 0H13a2 2 0 0 1 2 2v5.17c0 .53-.21 1.04-.59 1.42zM12 3a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
        </svg>
        <span class="badge-text" id="tagLabel-SE"></span>
      </div>
      <span class="title" id="title-SE"></span>
    </div>
    <div class="col-message">
      <span class="subtitle" id="subtitle-SE"></span>
    </div>
    <div class="col-action">
      <div class="counter">
        <span class="timer-label" id="timerLabel-SE"></span>
        <div class="units">
          <div class="unit"><span class="unit-num" id="d-SE">00</span><span class="unit-lbl">Days</span></div>
          <span class="colon">:</span>
          <div class="unit"><span class="unit-num" id="h-SE">00</span><span class="unit-lbl">H</span></div>
          <span class="colon">:</span>
          <div class="unit"><span class="unit-num" id="m-SE">00</span><span class="unit-lbl">Min</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── Injection générique — applique un CONFIG à un banner ── */
    function initBanner(market) {
      const c = CONFIGS[market];
      const banner = document.getElementById('banner-' + market);

      banner.style.background                                        = c.bgColor;
      document.getElementById('badge-' + market).style.background   = c.tagBgColor;
      document.getElementById('badge-icon-' + market).style.fill    = c.tagTextColor;
      document.getElementById('tagLabel-' + market).textContent     = c.tagLabel;
      document.getElementById('tagLabel-' + market).style.color     = c.tagTextColor;
      document.getElementById('title-' + market).textContent        = c.title;
      document.getElementById('timerLabel-' + market).textContent   = c.timerLabel;

      const subtitleEl = document.getElementById('subtitle-' + market);
      subtitleEl.textContent = c.subtitle;
      if (c.subtitleLarge) subtitleEl.classList.add('subtitle-large');

      const ctaEl = document.getElementById('cta-' + market);
      if (ctaEl && c.showCta !== false) {
        ctaEl.textContent = c.ctaLabel;
        ctaEl.style.color = c.ctaTextColor;
        ctaEl.href        = c.ctaUrl;
      }
    }

    /* ── Compte à rebours — met à jour tous les marchés ── */
    function tick() {
      Object.keys(CONFIGS).forEach(market => {
        const diff = Math.max(0, new Date(CONFIGS[market].targetDate) - Date.now());
        document.getElementById('d-' + market).textContent = String(Math.floor(diff / 86400000)).padStart(2, '0');
        document.getElementById('h-' + market).textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
        document.getElementById('m-' + market).textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
      });
    }

    /* ── Init ── */
    Object.keys(CONFIGS).forEach(initBanner);
    tick();
    setInterval(tick, 1000);

    /* ── Responsive — détection de dépassement via scrollWidth ── */
    function checkOverflows(banner) {
      const colMsg  = banner.querySelector('.col-message');
      const subtitle = banner.querySelector('.subtitle');
      const ctaEl   = banner.querySelector('.cta');

      /* Étape 1 — remettre tout visible pour mesurer l'état naturel */
      if (colMsg) colMsg.style.display = 'flex';
      if (ctaEl)  ctaEl.style.display  = 'flex';

      /* Étape 2 — l'accroche déborde de sa colonne → masquer col-message
         Le buffer de 40px déclenche le masquage avant que les derniers caractères soient tronqués */
      if (colMsg && subtitle) {
        const subtitleClipped = subtitle.scrollWidth + 40 > colMsg.clientWidth;
        if (subtitleClipped) colMsg.style.display = 'none';
      }

      /* Étape 3 — le banner déborde (col-1 + col-3 > bannière) → masquer le CTA */
      if (ctaEl) {
        const bannerOverflows = banner.scrollWidth > banner.clientWidth + 1;
        if (bannerOverflows) ctaEl.style.display = 'none';
      }
    }

    document.querySelectorAll('.banner').forEach(banner => {
      const ro = new ResizeObserver(() => checkOverflows(banner));
      ro.observe(banner);
    });
  </script>

</body>
</html>
